[/Script/Engine.AssetManagerSettings]
PrimaryAssetRules=(Priority=-1,ChunkId=-1,bApplyRecursively=True,CookRule=Unknown)

; Register City17 maps with standard Map type for Asset Manager resolution
; This allows GetPrimaryAssetIdForPath() to resolve /City17/Maps/ assets
; Required for Phase 3 (PreloadCriticalAssets) to preload map assets before travel
+PrimaryAssetTypesToScan=(
    PrimaryAssetType="Map",
    AssetBaseClass=/Script/Engine.World,
    bHasBlueprintClasses=false,
    bIsEditorOnly=false,
    Directories=((Path="/City17/Maps")),
    Rules=(CookRule=Game)
)
