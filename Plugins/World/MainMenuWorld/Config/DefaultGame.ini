[/Script/Engine.AssetManagerSettings]
PrimaryAssetRules=(Priority=-1,ChunkId=-1,bApplyRecursively=True,CookRule=Unknown)

; Register MainMenuWorld maps with standard Map type for Asset Manager resolution
; This allows GetPrimaryAssetIdForPath() to resolve /MainMenuWorld/Maps/ assets
+PrimaryAssetTypesToScan=(
    PrimaryAssetType="Map",
    AssetBaseClass=/Script/Engine.World,
    bHasBlueprintClasses=false,
    bIsEditorOnly=false,
    Directories=((Path="/MainMenuWorld/Maps")),
    Rules=(CookRule=Game)
)
